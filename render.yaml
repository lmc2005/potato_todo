services:
  - type: web
    name: potato-todo-api
    runtime: python
    plan: free
    autoDeploy: false
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: uvicorn apps.api.potato_api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v2/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: APP_ENV
        value: production
      - key: STUDY_DB_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_DAYS
        value: "14"
      - key: REFRESH_COOKIE_NAME
        value: potato_refresh_token
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AI_ENABLED
        value: "false"
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: OPENAI_REASONING_EFFORT
        value: medium
